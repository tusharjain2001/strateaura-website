<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display: block;" viewBox="0 0 87.552 280" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Figma (node 1434:2999) draws Group 69 horizontally (280x87.552) then applies
     -rotate-90 + -scale-y-100, which composes to a transpose (x,y) -> (y,x).
     Baked in here as matrix(0 1 1 0 0 0) so the strip can be placed with a plain
     percentage box instead of CSS rotation, which does not survive a fluid card. -->
